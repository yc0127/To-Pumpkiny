<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对不起，我错了</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="apology-content">
            <div class="apology-emoji">🥺</div>
            <h1>Sorry for letting you down...</h1>
            <p class="apology-letter">
                亲爱的老米，<br><br>
                我再怎么忙也绝对不能忘记你的生日。对不起！
                我反思了我的处理方式，并认识到我的逃避沟通。
                我真的很在乎你，不想因为我的过失而影响我们之间的感情。
                希望你能给我一个机会，咱们来一次deep talk。
                <br><br>
                真诚地，<br>
                老峻
            </p>
            <div class="question">
                <p>你是否能接受我的deep talk邀请？</p>
            </div>
            <div class="buttons">
                <button id="forgiveBtn" class="button forgive">真是便宜你了，那就姑且接受吧</button>
                <button id="notForgiveBtn" class="button not-forgive">永不原谅你</button>
            </div>
        </div>
        <div id="thankYouMessage" class="hidden">
            <h2>谢谢老婆！我会好好珍惜的！咱们好好聊聊吧！</h2>
            <p>🎂生日快乐🎂 （美东时间）</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
